<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Panel de Control{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar responsive -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container-fluid">
            <!-- Tarjeta de usuario transparente -->
            <a class="navbar-brand d-flex align-items-center" href="#">
                <div class="d-flex align-items-center text-light rounded px-2 py-1" style="background: rgba(255,255,255,0.1);">
                    <img src="/static/img/user_24.png" 
                        class="user-img me-2" 
                        alt="Usuario" 
                        data-bs-toggle="tooltip" 
                        title="{{ admin.username }}" 
                        style="width:24px; height:24px;">                    
                </div>
            </a>

            <!-- Toggle para móviles -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"
                    aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Contenido colapsable -->
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link text-light" href="{{ url_for('admin_articles') }}">Artículos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light" href="{{ url_for('admin_categories') }}">Categorías</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light" href="{{ url_for('admin_users') }}">Usuarios</a>
                    </li>

                    <!-- Cerrar sesión -->
                    <li class="nav-item">
                        <form action="/auth/logout" method="post" class="d-inline">
                            <button type="submit" class="nav-link text-light btn btn-link">Cerrar sesión</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenedor principal -->
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script> 
    <script src="{{ url_for('static', path='js/admin.js') }}"></script>   
    <!-- BLOQUE PARA SCRIPTS -->
    {% block scripts %}{% endblock %}

</body>
</html>
