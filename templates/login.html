{% extends 'base.html' %}

{% block css %}
<link rel="stylesheet" href="{{ url_for('static', path='/css/login.css') }}">
{% endblock %}

{% block content %}


<div class="login-container">
    <div class="login-card">
        <h2>Iniciar Sesión</h2>

        <form id="form-login" method="POST" action="/auth/token">
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="btn-primary">Ingresar</button>
        </form>

        <p class="text-center mt-3">
            ¿No tienes cuenta? <a href="{{ url_for('account_user') }}">Regístrate</a>
        </p>
    </div>
</div>

{% endblock %}

{% block script %}
<script src="{{ url_for('static', path='js/product_detail.js') }}"></script>
{% endblock %}
