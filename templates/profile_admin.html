{% extends 'base_admin.html' %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card p-4 shadow" style="max-width: 400px; width: 100%;">

        <!-- Encabezado -->
        <h3 class="text-center mb-4">Perfil de Usuario</h3>

        <!-- Foto y datos -->
        <div class="text-center mb-3">
            <img src="/static/img/user_64.png" class="profile-img mb-2" alt="Foto de usuario">
            <h5>{{ admin.full_name }}</h5>
            <p class="text-muted">@{{ admin.username }}</p>
        </div>

        <div class="text-start px-4 mb-3">
            <p><strong>Nombre completo:</strong> {{ admin.full_name }}</p>
            <p><strong>Usuario:</strong> {{ admin.username }}</p>
            <p><strong>Email:</strong> {{ admin.email }}</p>
        </div>

        <hr>

        <!-- Botón Editar Perfil -->
        <div class="d-grid px-4 mb-2">
            <a href="/admin/edit_profile" class="btn btn-primary w-100">Editar Perfil</a>
        </div>

        <!-- Logout -->
        <div class="d-grid px-4">
            <form id="form-logout" method="post" action="/admin/users/logout">
                <button id="logoutBtn" class="btn btn-secondary w-100">Cerrar sesión</button>
            </form>
        </div>

    </div>
</div>
{% endblock %}
